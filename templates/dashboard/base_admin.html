<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de administrador</title>
    <link rel="stylesheet" href="/static/css/estilo_admin.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
        <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!-- Responsive -->
<link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css">

<!-- Botones Exportación -->
<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css">
</head>

<body>
    <!-- Navbar Superior -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm fixed-top">
    <div class="container-fluid">
        <button class="btn btn-dark me-2" type="button" data-bs-toggle="offcanvas"
            data-bs-target="#sidebarAdmin">
            <i class="fas fa-bars"></i>
        </button>


            <a href="{{url_for('logout')}}" class="btn btn-outline-light btn-sm">
                <i class="fas fa-sign-out-alt"></i>
                Salir
            </a>
        </div>
    </div>
</nav>

<!-- Sidebar -->
<div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1"
    id="sidebarAdmin">

    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title">
            <i class="fas fa-user-shield me-2"></i>
            Panel Administrativo
        </h5>

        <button type="button" class="btn-close btn-close-white"
            data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body p-0">

        <!-- Perfil -->
        <div class="text-center py-4 border-bottom">
            <i class="fas fa-user-circle fa-4x mb-2"></i>
            <h6 class="mb-0">Administrador</h6>
            <small class="text-secondary">
                Control General del Sistema
            </small>
        </div>

        <!-- Menú -->
        <ul class="nav flex-column py-3">

            <li class="nav-item">
                <a href="{{url_for('dashboard')}}"
                    class="nav-link text-white">
                    <i class="fas fa-images me-2"></i>
                    Carrusel
                </a>
            </li>

            <li class="nav-item">
                <a href="{{url_for('catalogo')}}"
                    class="nav-link text-white">
                    <i class="fas fa-car-side me-2"></i>
                    Catálogo de Autos
                </a>
            </li>

            <li class="nav-item">
                <a href="#"
                    class="nav-link text-white">
                    <i class="fas fa-file-invoice-dollar me-2"></i>
                    Cotizaciones de autos
                </a>
            </li>

            <li class="nav-item">
                <a href="#"
                    class="nav-link text-white">
                    <i class="fas fa-hand-holding-dollar me-2"></i>
                    Solicitudes de Crédito
                </a>
            </li>

            <li class="nav-item">
                <a href="#"
                    class="nav-link text-white">
                    <i class="fas fa-chart-pie me-2"></i>
                    Graficas
                </a>
            </li>

        </ul>
    </div>
</div>
    {%block admin%}

    {%endblock%}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>

<script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>

<script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>

<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap5.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>

<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>

</body>

</html>
